name: Desplegar dashboard en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Instalar dependencias
        working-directory: app
        run: npm ci
      - name: Compilar
        working-directory: app
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages falla intermitentemente con "Deployment failed, try again later" —
      # el primer intento tolera el error y el segundo reintenta tras 30 s.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Esperar antes del reintento
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: reintento
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
